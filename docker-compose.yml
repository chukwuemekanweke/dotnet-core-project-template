services:
  database-migrator:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.DatabaseMigrator/Dockerfile
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_PAT: ${GITHUB_PAT}
    environment:
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PAT: ${GITHUB_PAT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServerWrite: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
    ports:
      - "8081:8080"
    depends_on:
      mssql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health/readiness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s
    restart: "no"

  webapi:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.WebAPI/Dockerfile
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_PAT: ${GITHUB_PAT}
    environment:
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PAT: ${GITHUB_PAT}
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServerWrite: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__SqlServerRead: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: BackendProjectTemplate
      Jwt__Audience: BackendProjectTemplate.Clients
      Jwt__SigningKey: super-secret-template-signing-key-change-me
      OpenTelemetry__ServiceName: BackendProjectTemplate.WebAPI
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      Database__InitializeOnStartup: "false"
    depends_on:
      database-migrator:
        condition: service_healthy
      mssql:
        condition: service_healthy
      redis:
        condition: service_started
      prometheus:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s

  consumer:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.Consumer/Dockerfile
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_PAT: ${GITHUB_PAT}
    environment:
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PAT: ${GITHUB_PAT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServerWrite: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__SqlServerRead: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__Redis: redis:6379
      Messaging__RabbitMq__ServiceName: BackendProjectTemplate.Consumer
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: guest
      Messaging__RabbitMq__Password: guest
      Messaging__RabbitMq__VirtualHost: /
      Messaging__RabbitMq__EventsExchange: x.events.backendprojecttemplate
      Messaging__RabbitMq__CommandsExchange: x.commands.backendprojecttemplate
      Notifications__Email__Mailtrap__ApiToken: ${MAILTRAP_TOKEN}
      OpenTelemetry__ServiceName: BackendProjectTemplate.Consumer
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
    depends_on:
      database-migrator:
        condition: service_healthy
      mssql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s

  jobs:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.Jobs/Dockerfile
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_PAT: ${GITHUB_PAT}
    environment:
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PAT: ${GITHUB_PAT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServerWrite: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__SqlServerRead: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__Redis: redis:6379
      Messaging__RabbitMq__ServiceName: BackendProjectTemplate.Jobs
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: guest
      Messaging__RabbitMq__Password: guest
      Messaging__RabbitMq__VirtualHost: /
      Messaging__RabbitMq__EventsExchange: x.events.backendprojecttemplate
      Messaging__RabbitMq__CommandsExchange: x.commands.backendprojecttemplate
      OpenTelemetry__ServiceName: BackendProjectTemplate.Jobs
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
    depends_on:
      database-migrator:
        condition: service_healthy
      mssql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: Your_strong_Password123!
    ports:
      - "14333:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_Password123! -Q "SELECT 1" -C
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitscout:
    image: ghcr.io/ralve-org/rabbitscout:latest
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 15672
      RABBITMQ_PROTOCOL: http
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "3001:3000"

  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.8.1
    command:
      - -config.file=/etc/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.5.0
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otel-collector/config.yml
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otel-collector/config.yml:ro
    depends_on:
      - tempo
      - loki
    ports:
      - "4317:4317"
      - "4318:4318"

  grafana:
    image: grafana/grafana:12.0.0
    depends_on:
      - prometheus
      - tempo
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
