services:
  database-migrator:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.DatabaseMigrator/Dockerfile
    environment:
      ConnectionStrings__SqlServer: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      Healthcheck__ReadyFilePath: /tmp/database-migrator/ready
      Healthcheck__FailedFilePath: /tmp/database-migrator/failed
    depends_on:
      mssql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/database-migrator/ready"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s
    restart: "no"

  webapi:
    build:
      context: .
      dockerfile: src/BackendProjectTemplate.WebAPI/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServer: Server=mssql,1433;Database=BackendProjectTemplateDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: BackendProjectTemplate
      Jwt__Audience: BackendProjectTemplate.Clients
      Jwt__SigningKey: super-secret-template-signing-key-change-me
      OpenTelemetry__ServiceName: BackendProjectTemplate.WebAPI
      OpenTelemetry__OtlpEndpoint: http://tempo:4317
      Database__InitializeOnStartup: "false"
    depends_on:
      database-migrator:
        condition: service_healthy
      mssql:
        condition: service_healthy
      redis:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "8080:8080"

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: Your_strong_Password123!
    ports:
      - "14333:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_Password123! -Q "SELECT 1" -C
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.8.1
    command:
      - -config.file=/etc/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"
      - "4317:4317"

  grafana:
    image: grafana/grafana:12.0.0
    depends_on:
      - prometheus
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
