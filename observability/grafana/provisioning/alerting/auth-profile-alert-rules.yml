apiVersion: 1

groups:
  - orgId: 1
    name: Authentication SLOs
    folder: BackendProjectTemplate Alerts
    interval: 1m
    rules:
      - uid: auth-password-signup-completion-rate-low
        title: Password sign-up completion rate below 95%
        condition: C
        data:
          - refId: A
            datasourceUid: Loki
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              datasource:
                type: loki
                uid: Loki
              editorMode: code
              expr: 100 * sum(count_over_time({service_name="BackendProjectTemplate.WebAPI"} | json | custom_event_name="PasswordSignUpCompleted" [30m])) / sum(count_over_time({service_name="BackendProjectTemplate.WebAPI"} | json | custom_event_name="PasswordSignUpStarted" [30m]))
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 95
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 30m
        annotations:
          summary: Password sign-up completion rate is below 95%.
          description: Password sign-up completions divided by starts has been below the SLO target for 30 minutes.
          runbook_url: docs/observability/authentication-events.md
        labels:
          area: authentication
          signal: business_slo
          severity: warning
        isPaused: false

