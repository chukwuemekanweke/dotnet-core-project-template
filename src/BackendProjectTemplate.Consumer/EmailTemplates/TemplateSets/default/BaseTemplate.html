<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{:Subject:}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f9f9f9;">
  <div style="margin:0 auto;max-width:600px;background-color:#f9f9f9;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-bottom:#333957 solid 5px;">
      <tr><td style="padding:20px 0;"></td></tr>
    </table>
  </div>
  <div style="margin:0 auto;max-width:600px;background-color:#ffffff;border:#dddddd solid 1px;border-top:0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
      <tr>
        <td align="center" style="padding:24px 25px 10px 25px;">
          <img src="https://i.imgur.com/KO1vcE9.png" alt="Logo" width="64" style="display:block;border:0;outline:none;text-decoration:none;" />
        </td>
      </tr>
      <tr>
        <td style="padding:0 25px 10px 25px;font-family:Helvetica Neue,Arial,sans-serif;color:#525252;">
          {{:BodyHtml:}}
        </td>
      </tr>
    </table>
  </div>
  <div style="margin:0 auto;max-width:600px;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
      <tr>
        <td align="center" style="padding:20px 0 0 0;font-family:Helvetica Neue,Arial,sans-serif;font-size:12px;color:#575757;">Some Firm Ltd, 35 Avenue. City 10115, USA</td>
      </tr>
      <tr>
        <td align="center" style="padding:10px 0 20px 0;font-family:Helvetica Neue,Arial,sans-serif;font-size:12px;color:#575757;"><a href="" style="color:#575757;">Unsubscribe</a> from our emails</td>
      </tr>
    </table>
  </div>
</body>
</html>
